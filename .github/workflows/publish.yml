name: publish-cdk

# Publish @horde.io/cdk on every v-prefix tag. Auth is npm trusted-publisher
# OIDC — no NODE_AUTH_TOKEN, no secrets in the repo. One-time setup at
# https://www.npmjs.com/package/@horde.io/cdk/access must link this repo +
# workflow + job before the first tag is cut.

on:
  push:
    tags:
      - "v*"

jobs:
  publish-cdk:
    name: publish-cdk
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: cdk
    steps:
      - uses: actions/checkout@v4

      # Node 24: ships npm >= 11.5.1, which is required for trusted-publisher
      # OIDC publish. Node 22 LTS still bundles npm 10.x; with npm 10 the
      # publish PUT goes out unauthenticated and the registry returns E404
      # (per npm docs, anonymous PUT on a scoped package is masked as 404,
      # not 401/403). In-place upgrading via `npm install -g npm@latest` is
      # currently broken on the hosted runner image too (actions/runner-images#13883),
      # so bumping node-version is the canonical fix per npm's own docs.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm test

      # No --provenance flag: trusted-publisher publishes are signed by
      # default since the npm 11 GA. No NODE_AUTH_TOKEN: an env-injected
      # legacy token would preempt the OIDC handshake.
      - run: npm publish --access public
