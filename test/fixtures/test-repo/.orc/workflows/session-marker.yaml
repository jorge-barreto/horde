name: horde-test
ticket-pattern: 'TEST-[\w-]+'
phases:
  - name: write-marker
    type: script
    run: |
      mkdir -p /home/horde/.claude/projects/horde-test
      echo "hello-from-phase-1" > /home/horde/.claude/projects/horde-test/marker
    timeout: 5
  - name: fail
    type: script
    run: "exit 1"
    timeout: 1
